name: Test SSH Connection

on:
  workflow_dispatch:

jobs:
  test:
    name: Test SSH
    runs-on: ubuntu-latest
    steps:
      - name: Test SSH Connection
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            echo "SSH connection successful!"
            whoami
            pwd
            ls -la /opt/monitor
