name: Deploy VPS Monitor

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: vps-deploy
  cancel-in-progress: false

jobs:
  # ── Etapa 1: Testes e Build ──────────────────────────────────────
  test:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/monitor-dashboard/package-lock.json

      - name: Install dashboard dependencies
        run: npm ci
        working-directory: apps/monitor-dashboard

      - name: Build dashboard
        run: npm run build
        working-directory: apps/monitor-dashboard
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8001

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/monitor-api/requirements.txt

      - name: Install API dependencies
        run: pip install -r requirements.txt
        working-directory: apps/monitor-api

      - name: Lint API (ruff)
        run: |
          pip install ruff --quiet
          ruff check app/
        working-directory: apps/monitor-api

  # ── Etapa 2: Deploy na VPS (só no push para main) ───────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            cd /opt/monitor

            echo "→ Pulling latest code..."
            git pull origin master

            echo "→ Updating API dependencies..."
            cd apps/monitor-api
            pip install -r requirements.txt -q --break-system-packages
            cd ../..

            echo "→ Building dashboard..."
            cd apps/monitor-dashboard
            npm ci --silent
            NODE_OPTIONS="--max-old-space-size=512" npm run build
            [ -d .next.old ] && rm -rf .next.old || true
            cd ../..

            echo "→ Restarting services..."
            systemctl restart monitor-api
            pm2 delete monitor-dashboard || true
            pm2 start npm --name monitor-dashboard --cwd /opt/monitor/apps/monitor-dashboard -- start -- -p 4000
            pm2 save

            echo "→ Deploy concluído com sucesso!"
