# Configuração nginx para monitor.diagonalit.com.br
# Arquivo: /etc/nginx/sites-available/monitor.diagonalit.com.br
#
# ACESSO RESTRITO POR IP — edite a seção "IPs autorizados" abaixo
# Para adicionar um IP novo: adicione uma linha "allow SEU_IP;"
# Para descobrir seu IP atual: acesse https://meuip.com.br

server {
    listen 443 ssl;
    server_name monitor.diagonalit.com.br;

    ssl_certificate     /etc/letsencrypt/live/monitor.diagonalit.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/monitor.diagonalit.com.br/privkey.pem;

    # ─── IPs autorizados ─────────────────────────────────────────
    # Rede interna da empresa
    allow 192.168.0.0/24;     # rede local (ajuste conforme sua rede)

    # IPs externos autorizados (adicione aqui)
    # allow 177.x.x.x;        # <- seu IP de casa (descubra em meuip.com.br)

    deny all;                  # bloqueia todos os outros
    # ─────────────────────────────────────────────────────────────

    # Dashboard Next.js
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # API FastAPI
    location /stats/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
    }
    location /security/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
    }
    location /firewall/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
    }
    location /health {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
    }

    # WebSocket para alertas em tempo real
    location /ws/ {
        proxy_pass         http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 86400;
    }
}

# Redireciona HTTP → HTTPS
server {
    listen 80;
    server_name monitor.diagonalit.com.br;
    return 301 https://$host$request_uri;
}
